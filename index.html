<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KVKK Gap Analizi</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F7F6F2;--surface:#fff;--border:rgba(0,0,0,.1);--border-strong:rgba(0,0,0,.2);
  --text:#1A1A1A;--muted:#6B6B6B;--faint:#A0A0A0;
  --green:#1D9E75;--green-bg:#E8F7F2;--green-txt:#0A4A33;
  --amber:#C68A00;--amber-bg:#FFF8E6;--amber-txt:#5C3D00;
  --red:#C0392B;--red-bg:#FDEEEC;--red-txt:#6B1A14;
  --navy:#1A1A2E;--mono:'Courier New',monospace;--sans:Arial,sans-serif;
}
body{font-family:var(--sans);background:var(--bg);color:var(--text);font-size:14px;line-height:1.5}

/* HEADER */
.header{background:var(--navy);color:#fff;padding:2rem 2rem 1.5rem}
.header-inner{max-width:1100px;margin:0 auto}
.header-tag{font-family:var(--mono);font-size:11px;color:rgba(255,255,255,.45);letter-spacing:.1em;text-transform:uppercase;margin-bottom:.5rem}
.header h1{font-size:26px;font-weight:700;letter-spacing:-.01em;margin-bottom:.3rem}
.header-sub{font-size:12px;color:rgba(255,255,255,.5)}

/* SKOR BAR */
.skor-bar{background:#fff;border-bottom:1px solid var(--border);padding:1rem 2rem;position:sticky;top:0;z-index:100}
.skor-inner{max-width:1100px;margin:0 auto;display:flex;align-items:center;gap:1.5rem;flex-wrap:wrap}
.skor-sayi{font-family:var(--mono);font-size:26px;font-weight:700;min-width:58px}
.skor-detay{flex:1;min-width:180px}
.skor-seviye{font-size:12px;font-weight:600;margin-bottom:5px}
.prog-track{height:4px;background:#EBEBEB;border-radius:2px;overflow:hidden}
.prog-fill{height:100%;border-radius:2px;transition:width .4s}
.sayaclar{display:flex;gap:14px;flex-wrap:wrap}
.sayac{font-size:11px;display:flex;align-items:center;gap:4px;color:var(--muted)}
.sdot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.filtre-row{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.fbtn{padding:4px 12px;border:1px solid var(--border-strong);border-radius:20px;font-size:11px;cursor:pointer;background:transparent;color:var(--muted);font-family:var(--sans)}
.fbtn.aktif{background:var(--navy);border-color:var(--navy);color:#fff}

/* MAIN */
.main{max-width:1100px;margin:0 auto;padding:1.5rem 2rem}

/* KATEGORİ */
.kategori{margin-bottom:2rem}
.kat-header{display:flex;align-items:center;gap:10px;margin-bottom:.75rem;padding-bottom:.6rem;border-bottom:1px solid var(--border)}
.kat-no{font-family:var(--mono);font-size:10px;color:var(--faint);min-width:22px}
.kat-baslik{font-size:13px;font-weight:700;flex:1}
.kat-kaynak{font-family:var(--mono);font-size:10px;color:var(--faint);border:1px solid var(--border);padding:2px 7px;border-radius:3px}
.kat-skor{font-family:var(--mono);font-size:11px;color:var(--faint)}

/* TABLO */
.tablo-wrap{overflow-x:auto;border:1px solid var(--border);border-radius:8px}
table{width:100%;border-collapse:collapse;font-size:12px;table-layout:fixed}
colgroup col:nth-child(1){width:44px}
colgroup col:nth-child(2){width:280px}
colgroup col:nth-child(3){width:110px}
colgroup col:nth-child(4){width:220px}
colgroup col:nth-child(5){width:180px}
colgroup col:nth-child(6){width:110px}
colgroup col:nth-child(7){width:100px}
th{background:#2D2D2D;color:#fff;font-size:10px;font-weight:600;padding:8px 10px;text-align:left;border-right:1px solid rgba(255,255,255,.1)}
th:last-child{border-right:none}
td{padding:8px 10px;border-bottom:1px solid var(--border);border-right:1px solid var(--border);vertical-align:top;line-height:1.4}
td:last-child{border-right:none}
tr:last-child td{border-bottom:none}
.row-evet td{background:var(--green-bg)}
.row-kismen td{background:var(--amber-bg)}
.row-hayir td{background:var(--red-bg)}
.row-uygulanamaz td{background:#F5F5F0}
.pill{display:inline-block;font-size:10px;padding:2px 9px;border-radius:20px;font-weight:600;white-space:nowrap}
.p-evet{background:var(--green);color:#fff}
.p-kismen{background:var(--amber);color:#fff}
.p-hayir{background:var(--red);color:#fff}
.p-na{background:#888;color:#fff}
.no-cell{font-family:var(--mono);font-size:10px;color:var(--faint);text-align:center}
.bulgu-cell{font-size:11px;color:var(--muted);line-height:1.45}
.bulgu-cell.evet{color:var(--green-txt)}
.bulgu-cell.kismen{color:var(--amber-txt)}
.bulgu-cell.hayir{color:var(--red-txt)}
.sorumlu{font-size:11px;color:var(--muted)}
.termin{font-size:11px;font-family:var(--mono);color:var(--muted)}

/* FOOTER */
.footer{max-width:1100px;margin:0 auto;padding:1.5rem 2rem;border-top:1px solid var(--border);font-size:11px;color:var(--faint);font-family:var(--mono)}
</style>
</head>
<body>

<div class="header">
  <div class="header-inner">
    <p class="header-tag">KVK Kurulu Resmi Rehberlerine Dayalı · 139 Soru · 8 Kategori · Örnek Denetim Raporu</p>
    <h1>KVKK Gap Analizi Aracı</h1>
    <p class="header-sub">Kurum: ABC Teknoloji A.Ş. &nbsp;·&nbsp; Hazırlayan: Ömer Tayfun Deveçeker &nbsp;·&nbsp; Denetim Tarihi: Temmuz 2023</p>
  </div>
</div>

        <div class="sayac"><div class="sdot" style="background:var(--red)"></div><span id="c-hayir">0 uyumsuz</span></div>
        <div class="sayac"><div class="sdot" style="background:#888"></div><span id="c-na">0 uygulanamaz</span></div>
      </div>
      <div class="filtre-row">
        <button class="fbtn aktif" onclick="filtrele('hepsi',this)">Tümü</button>
        <button class="fbtn" onclick="filtrele('Evet',this)">Evet</button>
        <button class="fbtn" onclick="filtrele('Kısmen',this)">Kısmen</button>
        <button class="fbtn" onclick="filtrele('Hayır',this)">Hayır</button>
        <button class="fbtn" onclick="filtrele('Uygulanamaz',this)">Uygulanamaz</button>
      </div>
    </div>
  </div>
</div>

<div class="main" id="main"></div>

<div style="text-align:center;" class="footer">
   Bu çalışma portfolyo amaçlıdır.
</div>

      {soru:"İhlal sonrası kök neden analizi yapılıyor mu?", yanit:"Kısmen", bulgu:"Büyük olaylar için kök neden analizi yapılıyor; küçük olaylar kayıt altına alınıyor ama analiz edilmiyor.", sorumlu:"IT Güvenlik", termin:"May 2025"},
      {soru:"İhlal müdahale ekibi ve sorumlulukları belirlenmiş mi?", yanit:"Evet", bulgu:"CISO, KVKK Sorumlusu, Hukuk ve IT temsilcilerinden oluşan müdahale ekibi tanımlı.", sorumlu:"CISO", termin:"—"},
      {soru:"İhlal simülasyonları (masa başı tatbikatları) gerçekleştiriliyor mu?", yanit:"Kısmen", bulgu:"Son tatbikat 18 ay önce yapılmış; yıllık tatbikat programı oluşturulmalı.", sorumlu:"IT Güvenlik", termin:"Haz 2025"},
      {soru:"İlgili kişilerin erişim hakkı başvurularını karşılayacak süreç tanımlanmış mı?", yanit:"Evet", bulgu:"Web sitesinde başvuru formu mevcut; KVKK Sorumlusu gelen talepleri takip ediyor.", sorumlu:"KVKK Sorumlusu", termin:"—"},
      {soru:"Düzeltme hakkı başvuruları 30 gün içinde yanıtlanıyor mu?", yanit:"Evet", bulgu:"Son 12 ayda gelen 23 başvurunun tamamı ortalama 12 günde yanıtlanmış.", sorumlu:"KVKK Sorumlusu", termin:"—"},
      {soru:"Silme/unutulma hakkı talepleri değerlendirme sürecine tabi mi?", yanit:"Evet", bulgu:"Her talep yasal saklama yükümlülüğü kontrolüyle değerlendiriliyor.", sorumlu:"KVKK Sorumlusu", termin:"—"},
      {soru:"İtiraz hakkı başvuruları için açık bir kanal var mı?", yanit:"Evet", bulgu:"E-posta ve web formu üzerinden itiraz başvurusu yapılabiliyor.", sorumlu:"KVKK Sorumlusu", termin:"—"},
      {soru:"Veri taşınabilirliği talepleri karşılanabiliyor mu?", yanit:"Kısmen", bulgu:"CRM verisini JSON formatında dışa aktarabiliyoruz; e-posta tercih verisi için bu imkân henüz yok.", sorumlu:"IT Müdürü", termin:"Haz 2025"},
      {soru:"İlgili kişi başvuruları yazılı prosedüre bağlanmış mı?", yanit:"Evet", bulgu:"İlgili Kişi Başvuru Yönetim Prosedürü (v1.2) onaylı ve yürürlükte.", sorumlu:"KVKK Sorumlusu", termin:"—"},
      {soru:"Başvuru yanıt süreleri takip edilip raporlanıyor mu?", yanit:"Evet", bulgu:"Aylık dashboard ile yanıt süreleri ve başvuru tipleri üst yönetime raporlanıyor.", sorumlu:"KVKK Sorumlusu", termin:"—"},
      {soru:"KVKK uyumluluğu bağımsız olarak denetleniyor mu?", yanit:"Kısmen", bulgu:"İç denetim birimi yılda bir inceleme yapıyor; bağımsız dış denetim hiç gerçekleştirilmemiş.", sorumlu:"İç Denetim", termin:"Tem 2025"},
    ]
  }
];

let aktifFiltre = 'hepsi';

function sayilariHesapla() {
  let evet=0, kismen=0, hayir=0, na=0;
  veri.forEach(k => k.sorular.forEach(s => {
    if(s.yanit==='Evet') evet++;
    else if(s.yanit==='Kısmen') kismen++;
    else if(s.yanit==='Hayır') hayir++;
    else if(s.yanit==='Uygulanamaz') na++;
  }));
  return {evet, kismen, hayir, na};
}

function guncelleSkor() {
  const {evet, kismen, hayir, na} = sayilariHesapla();
  const toplam = 139;
  const skor = Math.round(((evet + kismen*0.5)/toplam)*100);
  document.getElementById('c-evet').textContent = evet+' uyumlu';
  document.getElementById('c-kismen').textContent = kismen+' kısmen';
  document.getElementById('c-hayir').textContent = hayir+' uyumsuz';
  document.getElementById('c-na').textContent = na+' uygulanamaz';
  document.getElementById('skor-sayi').textContent = '%'+skor;
  const fill = document.getElementById('prog-fill');
  fill.style.width = skor+'%';
  let renk, seviye;
  if(skor>=80){renk='var(--green)';seviye='İyi düzeyde uyumlu'}
  else if(skor>=60){renk='var(--amber)';seviye='Kısmen uyumlu — gelişim gerekiyor'}
  else{renk='var(--red)';seviye='Yetersiz — öncelikli aksiyon gerekiyor'}
  fill.style.background=renk;
  document.getElementById('skor-sayi').style.color=renk;
  document.getElementById('skor-seviye').textContent=seviye;
  document.getElementById('skor-seviye').style.color=renk;
}

function filtrele(filtre, btn) {
  aktifFiltre = filtre;
  document.querySelectorAll('.fbtn').forEach(b=>b.classList.remove('aktif'));
  btn.classList.add('aktif');
  document.querySelectorAll('tr[data-yanit]').forEach(tr => {
    tr.style.display = (filtre==='hepsi'||tr.dataset.yanit===filtre) ? '' : 'none';
  });
  document.querySelectorAll('.kategori').forEach(div => {
    const gorunenler = div.querySelectorAll('tr[data-yanit]:not([style*="none"])');
    div.style.display = (filtre==='hepsi'||gorunenler.length>0) ? '' : 'none';
  });
}

function render() {
  const main = document.getElementById('main');
  let globalNo = 1;

  veri.forEach((kat, ki) => {
    const div = document.createElement('div');
    div.className = 'kategori';

    const evet = kat.sorular.filter(s=>s.yanit==='Evet').length;
    const kismen = kat.sorular.filter(s=>s.yanit==='Kısmen').length;
    const hayir = kat.sorular.filter(s=>s.yanit==='Hayır').length;
    const pct = Math.round(((evet+kismen*0.5)/kat.sorular.length)*100);

    div.innerHTML = `
      <div class="kat-header">
        <span class="kat-no">0${ki+1}</span>
        <span class="kat-baslik">${kat.kategori}</span>
        <span class="kat-kaynak">${kat.kaynak}</span>
        <span class="kat-skor">%${pct} uyum</span>
      </div>
      <div class="tablo-wrap">
        <table>
          <colgroup>
            <col><col><col><col><col><col><col>
          </colgroup>
          <thead>
            <tr>
              <th>No</th><th>Kontrol Sorusu</th><th>Yanıt</th>
              <th>Evet: Kanıt / Kısmen: Ne yapılmış + Eksik / Hayır: Bulgu</th>
              <th>Aksiyon</th><th>Sorumlu</th><th>Termin</th>
            </tr>
          </thead>
          <tbody id="tbody-${ki}"></tbody>
        </table>
      </div>
    `;
    main.appendChild(div);

    const tbody = document.getElementById(`tbody-${ki}`);
    kat.sorular.forEach(s => {
      const tr = document.createElement('tr');
      const cls = s.yanit==='Evet'?'row-evet':s.yanit==='Kısmen'?'row-kismen':s.yanit==='Hayır'?'row-hayir':'row-uygulanamaz';
      const pillCls = s.yanit==='Evet'?'p-evet':s.yanit==='Kısmen'?'p-kismen':s.yanit==='Hayır'?'p-hayir':'p-na';
      const bulgeCls = s.yanit==='Evet'?'evet':s.yanit==='Kısmen'?'kismen':s.yanit==='Hayır'?'hayir':'';
      tr.className = cls;
      tr.dataset.yanit = s.yanit;
      tr.innerHTML = `
        <td class="no-cell">${String(globalNo++).padStart(3,'0')}</td>
        <td>${s.soru}</td>
        <td style="text-align:center"><span class="pill ${pillCls}">${s.yanit}</span></td>
        <td class="bulgu-cell ${bulgeCls}">${s.bulgu}</td>
        <td class="bulgu-cell">${s.yanit!=='Evet'&&s.yanit!=='Uygulanamaz'?'Aksiyon planına alındı.':''}</td>
        <td class="sorumlu">${s.sorumlu}</td>
        <td class="termin">${s.termin}</td>
      `;
      tbody.appendChild(tr);
    });
  });

  guncelleSkor();
}

render();
</script>
</body>
</html>
